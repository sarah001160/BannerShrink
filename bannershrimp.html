<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script> -->
</head>
<style>
    .fs-b{
        font-size:40px;
    }
    body{
        width:100%;
        height:1000vh;
        box-sizing:border-box;
    }
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }
    .kv{
        position:relative;
        width:100%;
        height:100vh;
        background-color:darkgoldenrod;
    }
    .kv>span{
        position:absolute;
        left:35%;
        bottom:40px;
    }
    .kvlist{
        position:absolute;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
        width:100%;
        height:100%;
        background-color:darkgrey;
        
    }
    .scroll .kvlist{
        width:500px;
        height:300px;
        transition:all 0.5s;
    }

    .banner{
        background-color:grey;
        padding:30px;
        min-height:500px;
    }
</style>
<body>

        <div class="kv">
            <span class="fs-b">Welcome to Hello Wold!!</span>
           <ul class="kvlist"><!---kvlist背景可以放影片嗎? 這樣畫面會非常酷,影片可以縮小--->
            <li></li>
           </ul>
        
        </div>
        <div class="banner">
            <span class="fs-b"><p>加油，你要做出一個技術含量高的sideproject!!不用背起來沒關係，做好筆記，記住觀念</p></span>
        </div>

    <script type="text/javascript">
       window.addEventListener("scroll",function(){
           let kv = document.querySelector('.kv');
           if(window.scrollY>0){
            kv.classList.add("scroll");
           }
           
       })
        //一般的寫法div.classList.toggle("className", window.scrollY>5);
      
      let img = ['url("https://picsum.photos/500/800?random=1")',
      ]
      function test(){
        let li = document.querySelector('li');
      li.style.display="block";
      li.style.backgroundImage=img[0];
      li.style.backgroundRepeat="no-repeat";
      li.style.backgroundSize='cover';
      li.style.width="100%";
      li.style.height="400px";
      }
      
      test();
     
    
    </script>
</body>
</html>
